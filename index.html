<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mercuri — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0B0B0D;color:#fff;font-family:'Montserrat',sans-serif;overflow:hidden;user-select:none}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 48px;border-bottom:1px solid rgba(190,150,126,0.14);flex-shrink:0;height:80px}
.logo-img{height:44px;width:auto;filter:brightness(0) invert(1);opacity:.92}
.h-center{text-align:center}
.dash-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:400;letter-spacing:.28em;color:#fff;text-transform:uppercase;line-height:1}
.dash-sub{font-size:8px;letter-spacing:.28em;color:rgba(190,150,126,.55);text-transform:uppercase;margin-top:5px}
.h-right{text-align:right;min-width:160px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#BE967E;box-shadow:0 0 8px rgba(190,150,126,.7);margin-right:6px;vertical-align:middle}
.clock{font-size:30px;font-weight:200;letter-spacing:.06em;color:#fff;vertical-align:middle}
.clock-date{font-size:8px;letter-spacing:.14em;color:rgba(255,255,255,.32);margin-top:3px;text-transform:uppercase}
/* DASHBOARDS */
.dash{display:none;flex-direction:column;height:100%;opacity:1;transition:opacity .5s}
.dash.active{display:flex}
/* SCROLL AREA */
.scroll-area{flex:1;overflow:hidden;position:relative;padding:0 48px}
.scroll-list{will-change:transform}
/* ROW */
.row{display:flex;align-items:center;gap:32px;padding:20px 0;border-bottom:1px solid rgba(190,150,126,.07);min-height:110px}
.pos{font-size:56px;font-weight:700;color:rgba(190,150,126,.2);width:80px;text-align:right;flex-shrink:0;font-family:'Cormorant Garamond',Georgia,serif;line-height:1}
.row.r1 .pos{color:#BE967E}
.row.r2 .pos{color:rgba(190,150,126,.6)}
.row.r3 .pos{color:rgba(190,150,126,.38)}
.avatar{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:0}
.row.r1 .avatar{box-shadow:0 0 0 2px rgba(190,150,126,.5)}
.info{flex:1;min-width:0}
.cname{font-size:26px;font-weight:600;color:#fff;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row.r1 .cname{font-size:32px;color:#fff}
.clabel{font-size:8.5px;letter-spacing:.24em;color:rgba(190,150,126,.45);text-transform:uppercase;margin-top:6px}
.bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.val-wrap{text-align:right;flex-shrink:0;min-width:180px}
.val{font-size:48px;font-weight:300;color:#BE967E;font-family:'Cormorant Garamond',Georgia,serif;line-height:1}
.row.r1 .val{font-size:60px}
.val-unit{font-size:10px;letter-spacing:.18em;color:rgba(190,150,126,.45);text-transform:uppercase;margin-top:4px;font-family:'Montserrat',sans-serif}
/* INDICATORS */
.indicators{display:flex;justify-content:center;align-items:center;gap:10px;padding:14px;flex-shrink:0}
.ind{height:3px;border-radius:2px;background:rgba(255,255,255,.12);transition:all .4s}
.ind.on{background:#BE967E;width:40px}
.ind.off{width:24px}
</style>
</head>
<body>

<div class="dash active" id="d0">
  <header>
    <img class="logo-img" src="https://imgs.kenlo.io/VWRCUkQ2Tnp3d1BJRDBJVe1s0xgxSbFGOsBT9+RO1zjks-ynciLnlXpdKzsuCVZKPvMZhGt-GI0v+QFtypVh7xY3icsFUfji5XHfj8KoyvKw6mCx17Tqnov84vjeYOqZmNhjjvWvHgL2v-I0TIAuak5yO7UgSUW7VIveYHYBrWHJ9xiXRrYWSjAQhAtvzlIMn1ayGMmhqwR11yr0WqOEpn6HFvq6R0RaGqxWEpoj5lhRvQ==.png" alt="Mercuri">
    <div class="h-center">
      <div class="dash-title">Ranking de Captações</div>
      <div class="dash-sub">Mês Atual</div>
    </div>
    <div class="h-right">
      <div><span class="dot"></span><span class="clock" id="ck0"></span></div>
      <div class="clock-date" id="cd0"></div>
    </div>
  </header>
  <div class="scroll-area" id="sa0"><div class="scroll-list" id="sl0"></div></div>
  <div class="indicators">
    <div class="ind on" data-d="0"></div>
    <div class="ind off" data-d="1"></div>
    <div class="ind off" data-d="2"></div>
  </div>
</div>

<div class="dash" id="d1">
  <header>
    <img class="logo-img" src="https://imgs.kenlo.io/VWRCUkQ2Tnp3d1BJRDBJVe1s0xgxSbFGOsBT9+RO1zjks-ynciLnlXpdKzsuCVZKPvMZhGt-GI0v+QFtypVh7xY3icsFUfji5XHfj8KoyvKw6mCx17Tqnov84vjeYOqZmNhjjvWvHgL2v-I0TIAuak5yO7UgSUW7VIveYHYBrWHJ9xiXRrYWSjAQhAtvzlIMn1ayGMmhqwR11yr0WqOEpn6HFvq6R0RaGqxWEpoj5lhRvQ==.png" alt="Mercuri">
    <div class="h-center">
      <div class="dash-title">Ranking VGC</div>
      <div class="dash-sub">Valor Geral de Captações · Mês Atual</div>
    </div>
    <div class="h-right">
      <div><span class="dot"></span><span class="clock" id="ck1"></span></div>
      <div class="clock-date" id="cd1"></div>
    </div>
  </header>
  <div class="scroll-area" id="sa1"><div class="scroll-list" id="sl1"></div></div>
  <div class="indicators">
    <div class="ind off" data-d="0"></div>
    <div class="ind on" data-d="1"></div>
    <div class="ind off" data-d="2"></div>
  </div>
</div>

<div class="dash" id="d2">
  <header>
    <img class="logo-img" src="https://imgs.kenlo.io/VWRCUkQ2Tnp3d1BJRDBJVe1s0xgxSbFGOsBT9+RO1zjks-ynciLnlXpdKzsuCVZKPvMZhGt-GI0v+QFtypVh7xY3icsFUfji5XHfj8KoyvKw6mCx17Tqnov84vjeYOqZmNhjjvWvHgL2v-I0TIAuak5yO7UgSUW7VIveYHYBrWHJ9xiXRrYWSjAQhAtvzlIMn1ayGMmhqwR11yr0WqOEpn6HFvq6R0RaGqxWEpoj5lhRvQ==.png" alt="Mercuri">
    <div class="h-center">
      <div class="dash-title">Ranking de Visitas</div>
      <div class="dash-sub">Mês Atual</div>
    </div>
    <div class="h-right">
      <div><span class="dot"></span><span class="clock" id="ck2"></span></div>
      <div class="clock-date" id="cd2"></div>
    </div>
  </header>
  <div class="scroll-area" id="sa2"><div class="scroll-list" id="sl2"></div></div>
  <div class="indicators">
    <div class="ind off" data-d="0"></div>
    <div class="ind off" data-d="1"></div>
    <div class="ind on" data-d="2"></div>
  </div>
</div>

<script>
const COLORS=['#5D4E6D','#7B6FA0','#4A7C8E','#6B8F71','#8B6F47','#7A4F6D','#4F7A8B','#8B7355','#6B4F8B','#4B8B7A','#8B4F5D','#6F8B4F','#4F6B8B','#8B7B4F','#6B7B8B'];
function initials(n){const p=n.trim().split(' ');return(p.length>=2?p[0][0]+p[p.length-1][0]:n.slice(0,2)).toUpperCase()}
function fmtCap(v){return(v||0).toFixed(1)}
function fmtVgc(v){if(!v)return'0';const m=v/1e6;return m>=1?(m%1?m.toFixed(1):m.toFixed(0))+' M':(v/1e3).toFixed(0)+' K'}
function fmtVis(v){return(v||0).toString()}

function buildRows(sorted,field,fmtFn,label){
  const max=sorted[0]?.[field]||1;
  return sorted.map((c,i)=>{
    const v=c[field]||0;
    const pct=Math.min(100,(v/max)*100);
    const barCol=i===0?'#BE967E':i<3?'rgba(190,150,126,.45)':'rgba(255,255,255,.13)';
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    return `<div class="row ${cls}">
      <div class="pos">${i+1}°</div>
      <div class="avatar" style="background:${COLORS[i%COLORS.length]}">${initials(c.nome)}</div>
      <div class="info">
        <div class="cname">${c.nome}</div>
        <div class="clabel">${label}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${barCol}"></div></div>
      </div>
      <div class="val-wrap">
        <div class="val">${fmtFn(v)}</div>
        <div class="val-unit">${label}</div>
      </div>
    </div>`;
  }).join('');
}

// Clock
function tickClock(){
  const n=new Date();
  const t=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const D=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const d=D[n.getDay()]+' · '+n.getDate()+' de '+M[n.getMonth()];
  [0,1,2].forEach(i=>{
    const ck=document.getElementById('ck'+i);
    const cd=document.getElementById('cd'+i);
    if(ck)ck.textContent=t;
    if(cd)cd.textContent=d;
  });
}
tickClock();setInterval(tickClock,1000);

// Scroll + transition
let cur=0,busy=false,raf=null;
const SPEED=0.5; // px per frame — ajuste para mais rápido/devagar
const END_PAUSE=2800; // ms antes de trocar

function setInds(idx){
  document.querySelectorAll('.ind').forEach(el=>{
    el.className='ind '+(parseInt(el.dataset.d)===idx?'on':'off');
  });
}

function scrollDash(idx){
  if(raf)cancelAnimationFrame(raf);
  const area=document.getElementById('sa'+idx);
  const list=document.getElementById('sl'+idx);
  if(!area||!list)return;
  list.style.transform='translateY(0px)';
  let y=0;
  const maxY=Math.max(0,list.scrollHeight-area.clientHeight);
  if(maxY===0){setTimeout(()=>advance(),END_PAUSE);return;}
  function step(){
    if(busy)return;
    y=Math.min(y+SPEED,maxY);
    list.style.transform=`translateY(-${y}px)`;
    if(y>=maxY){setTimeout(()=>advance(),END_PAUSE);return;}
    raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
}

function goTo(idx){
  if(busy)return;
  busy=true;
  if(raf)cancelAnimationFrame(raf);
  const from=document.getElementById('d'+cur);
  const to=document.getElementById('d'+idx);
  from.style.transition='opacity .45s';
  from.style.opacity='0';
  setTimeout(()=>{
    from.classList.remove('active');
    from.style.opacity='';
    from.style.transition='';
    to.classList.add('active');
    to.style.opacity='0';
    to.style.transition='opacity .45s';
    cur=idx;
    setInds(idx);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        to.style.opacity='1';
        setTimeout(()=>{
          to.style.transition='';
          to.style.opacity='';
          busy=false;
          scrollDash(idx);
        },450);
      });
    });
  },460);
}

function advance(){goTo((cur+1)%3)}

document.addEventListener('click',()=>{if(!busy)advance()});

// Load data
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    const data=await r.json();
    const c=data.corretores||[];
    const byCap=[...c].sort((a,b)=>(b.c||0)-(a.c||0));
    const byVgc=[...c].sort((a,b)=>(b.vgc||0)-(a.vgc||0));
    const byVis=[...c].sort((a,b)=>(b.v||0)-(a.v||0));
    document.getElementById('sl0').innerHTML=buildRows(byCap,'c',fmtCap,'Captações');
    document.getElementById('sl1').innerHTML=buildRows(byVgc,'vgc',fmtVgc,'VGC');
    document.getElementById('sl2').innerHTML=buildRows(byVis,'v',fmtVis,'Visitas');
    if(!busy)scrollDash(cur);
  }catch(e){console.error(e)}
}
loadData();
setInterval(loadData,120000);
</script>
</body>
</html>
