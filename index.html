<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mercuri Imóveis — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0B0B0D;color:#fff;font-family:'Montserrat',sans-serif;overflow:hidden;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid rgba(190,150,126,0.15);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-img{height:42px;width:auto;filter:brightness(0) invert(1);opacity:0.92}
.vdiv{width:1px;height:32px;background:rgba(190,150,126,0.18);margin:0 20px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.clock-row{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#BE967E;box-shadow:0 0 8px rgba(190,150,126,0.7)}
.clock-wrap{text-align:right}
.clock{font-size:28px;font-weight:300;letter-spacing:0.06em;color:#fff;line-height:1}
.clock-date{font-size:8.5px;letter-spacing:0.14em;color:rgba(255,255,255,0.35);margin-top:3px;text-transform:uppercase}
.month-badge{border:1px solid rgba(190,150,126,0.28);padding:5px 13px;font-size:9.5px;letter-spacing:0.16em;color:rgba(190,150,126,0.75);font-weight:500}
.last-update-wrap{text-align:right}
.last-update-lbl{font-size:6.5px;letter-spacing:0.2em;color:rgba(190,150,126,0.38);text-transform:uppercase}
.last-update-val{font-size:9.5px;letter-spacing:0.05em;color:rgba(255,255,255,0.45);margin-top:1px}
main{display:flex;flex:1;overflow:hidden}
.ranking-section{flex:1;padding:16px 22px 10px;overflow-y:auto;border-right:1px solid rgba(190,150,126,0.07)}
.section-title{font-size:16px;font-weight:600;letter-spacing:0.2em;color:#fff;font-family:'Cormorant Garamond',Georgia,serif}
.section-sub{font-size:7px;letter-spacing:0.22em;color:rgba(190,150,126,0.45);margin-top:2px;text-transform:uppercase}
.ranking-header{display:grid;grid-template-columns:28px 44px 1fr 80px 70px 70px 90px;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(190,150,126,0.1);margin-top:10px}
.th{font-size:7px;letter-spacing:0.2em;color:rgba(190,150,126,0.45);text-transform:uppercase}
.th.right{text-align:right}
.row{display:grid;grid-template-columns:28px 44px 1fr 80px 70px 70px 90px;align-items:center;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.025);transition:background .2s}
.row:hover{background:rgba(190,150,126,0.035)}
.row.top1{border-left:2px solid #BE967E}
.row.top2{border-left:2px solid rgba(190,150,126,0.5)}
.row.top3{border-left:2px solid rgba(190,150,126,0.25)}
.rank{font-size:12px;font-weight:600;color:rgba(255,255,255,0.28)}
.row.top1 .rank{color:#BE967E}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.name-bar{padding-right:14px}
.corretor-name{font-size:12.5px;font-weight:500;color:#fff;margin-bottom:5px}
.bar-wrap{position:relative;height:2.5px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:visible}
.bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.bar-label{position:absolute;right:0;top:-13px;font-size:7.5px;color:rgba(255,255,255,0.22)}
.metric{font-size:14px;font-weight:400;color:rgba(255,255,255,0.7);text-align:right}
.pts{font-size:18px;font-weight:600;color:#BE967E;text-align:right}
.row.top1 .pts{font-size:20px}
.vgc-panel{width:288px;flex-shrink:0;padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.vgc-title{font-size:17px;font-weight:600;letter-spacing:0.2em;color:#fff;font-family:'Cormorant Garamond',Georgia,serif}
.vgc-tabs{margin-bottom:2px}
.tab-btn{background:rgba(190,150,126,0.1);border:1px solid rgba(190,150,126,0.35);color:#BE967E;font-size:8px;letter-spacing:0.18em;padding:5px 14px;cursor:default;font-family:'Montserrat',sans-serif;font-weight:600}
.vgc-sub{font-size:7px;letter-spacing:0.18em;color:rgba(190,150,126,0.4);text-transform:uppercase;margin-bottom:4px}
.vgc-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.035)}
.vgc-pos{font-size:10px;color:rgba(190,150,126,0.45);width:22px;flex-shrink:0;font-weight:600}
.vgc-row:first-child .vgc-pos{color:#BE967E;font-size:12px}
.vgc-name{font-size:12px;color:rgba(255,255,255,0.82);flex:1}
.vgc-row:first-child .vgc-name{color:#fff;font-weight:600;font-size:13px}
.vgc-val{font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.75)}
.vgc-row:first-child .vgc-val{color:#BE967E;font-size:13px}
.vgc-total-wrap{margin-top:auto;padding-top:14px;border-top:1px solid rgba(190,150,126,0.15)}
.vgc-total-lbl{font-size:7px;letter-spacing:0.18em;color:rgba(190,150,126,0.4);text-transform:uppercase}
.vgc-total-val{font-size:24px;font-weight:300;color:#BE967E;margin-top:5px;font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:0.04em}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <img class="logo-img" src="https://imgs.kenlo.io/VWRCUkQ2Tnp3d1BJRDBJVe1s0xgxSbFGOsBT9+RO1zjks-ynciLnlXpdKzsuCVZKPvMZhGt-GI0v+QFtypVh7xY3icsFUfji5XHfj8KoyvKw6mCx17Tqnov84vjeYOqZmNhjjvWvHgL2v-I0TIAuak5yO7UgSUW7VIveYHYBrWHJ9xiXRrYWSjAQhAtvzlIMn1ayGMmhqwR11yr0WqOEpn6HFvq6R0RaGqxWEpoj5lhRvQ==.png" alt="Mercuri Negócios Imobiliários">
  </div>
  <div class="vdiv"></div>
  <div style="flex:1"></div>
  <div class="header-right">
    <div class="clock-row">
      <div class="dot"></div>
      <div class="clock-wrap">
        <div class="clock" id="clock">--:--</div>
        <div class="clock-date" id="clock-date"></div>
      </div>
      <div class="month-badge" id="month-badge"></div>
    </div>
    <div class="last-update-wrap">
      <div class="last-update-lbl">ÚLTIMA ATUALIZAÇÃO</div>
      <div class="last-update-val" id="last-update-val">—</div>
    </div>
  </div>
</header>
<main>
  <section class="ranking-section">
    <div class="section-title">RANKING DE MOVIMENTO</div>
    <div class="section-sub">PONTUAÇÃO ACUMULADA NO MÊS</div>
    <div class="ranking-header">
      <div class="th">#</div>
      <div class="th"></div>
      <div class="th">CORRETOR</div>
      <div class="th right">CAPT.</div>
      <div class="th right">VIS.</div>
      <div class="th right">ATU.</div>
      <div class="th right">PTS MÊS</div>
    </div>
    <div id="ranking-list"></div>
  </section>
  <aside class="vgc-panel">
    <div class="vgc-title">RANKING VGC</div>
    <div class="vgc-tabs">
      <button class="tab-btn active" data-tab="mes">MENSAL</button>
    </div>
    <div class="vgc-sub" id="vgc-sub">VALOR GERAL DE CAPTAÇÕES · MÊS ATUAL</div>
    <div id="vgc-list"></div>
    <div class="vgc-total-wrap">
      <div class="vgc-total-lbl">TOTAL VGC — MÊS ATUAL</div>
      <div class="vgc-total-val" id="vgc-total">R$ 0</div>
    </div>
  </aside>
</main>
<script>
const COLORS=['#5D4E6D','#7B6FA0','#4A7C8E','#6B8F71','#8B6F47','#7A4F6D','#4F7A8B','#8B7355','#6B4F8B','#4B8B7A','#8B4F5D','#6F8B4F','#4F6B8B','#8B7B4F','#6B7B8B'];
function fmtM(v){if(!v)return'R$ 0';const m=v/1e6;return m>=1?'R$ '+(m%1?m.toFixed(1):m.toFixed(0))+' M':'R$ '+(v/1e3).toFixed(0)+' K'}
function fmtP(v){return typeof v==='number'?v.toFixed(1):'-'}
function initials(n){const p=n.trim().split(' ');return(p.length>=2?p[0][0]+p[p.length-1][0]:n.slice(0,2)).toUpperCase()}
function calcPts(c){return(c.c||0)*3+(c.v||0)*2+(c.a||0)}

function renderRanking(list){
  const s=[...list].map(c=>({...c,pts:calcPts(c)})).sort((a,b)=>b.pts-a.pts);
  const max=s[0]?.pts||1;
  document.getElementById('ranking-list').innerHTML=s.map((c,i)=>{
    const capPct=Math.min(100,Math.round(((c.c||0)/30)*100));
    const barCol=i===0?'#BE967E':i<3?'rgba(190,150,126,0.45)':'rgba(255,255,255,0.15)';
    const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
    return `<div class="row ${cls}">
      <div class="rank">${i+1}</div>
      <div><div class="avatar" style="background:${COLORS[i%COLORS.length]}">${initials(c.nome)}</div></div>
      <div class="name-bar">
        <div class="corretor-name">${c.nome}</div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${capPct}%;background:${barCol}"></div>
          <span class="bar-label">${(c.c||0).toFixed(1)}/30</span>
        </div>
      </div>
      <div class="metric">${(c.c||0).toFixed(1)}</div>
      <div class="metric">${c.v||0}</div>
      <div class="metric">${c.a||0}</div>
      <div class="pts">${fmtP(c.pts)}</div>
    </div>`;
  }).join('');
}

function renderVgc(list){
  const s=[...list].sort((a,b)=>(b.vgc||0)-(a.vgc||0));
  const total=s.reduce((t,c)=>t+(c.vgc||0),0);
  document.getElementById('vgc-list').innerHTML=s.map((c,i)=>`
    <div class="vgc-row">
      <div class="vgc-pos">${i+1}°</div>
      <div class="vgc-name">${c.nome.split(' ')[0]}</div>
      <div class="vgc-val">${fmtM(c.vgc||0)}</div>
    </div>`).join('');
  document.getElementById('vgc-total').textContent=fmtM(total);
}

function renderAll(data){
  const lu=document.getElementById('last-update-val');
  if(lu){
    const ts=data.atualizado_em?new Date(data.atualizado_em):null;
    lu.textContent=ts&&!isNaN(ts)
      ?ts.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
      :'Hoje, '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  renderRanking(data.corretores||[]);
  renderVgc(data.corretores||[]);
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const D=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('clock-date').textContent=D[n.getDay()]+' · '+n.getDate()+' de '+M[n.getMonth()];
  document.getElementById('month-badge').textContent=M[n.getMonth()].toUpperCase()+' '+n.getFullYear();
}
updateClock();
setInterval(updateClock,1000);

async function loadData(){
  try{const r=await fetch('data.json?t='+Date.now());const d=await r.json();renderAll(d);}
  catch(e){console.error(e)}
}
loadData();
setInterval(loadData,120000);
</script>
</body>
</html>
